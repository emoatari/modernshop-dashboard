<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | ModernShop</title>

        <!-- Bootstrap 5.3.8 CSS -->
        <link rel="stylesheet" href="Assets/css/bootstrap.min.css" />
        <link rel="stylesheet" href="Assets/css/bootstrap-icons.min.css" />

        <style>
            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            }

            .login-card {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
                padding: 40px;
                width: 100%;
                max-width: 420px;
                animation: fadeIn 0.5s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .login-header {
                text-align: center;
                margin-bottom: 30px;
            }

            .login-header h2 {
                color: #333;
                font-weight: bold;
            }

            .login-header p {
                color: #666;
                font-size: 0.9rem;
            }

            .form-control:focus {
                box-shadow: none;
                border-color: #667eea;
            }

            .btn-login {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                color: white;
                padding: 12px;
                font-weight: bold;
                border-radius: 10px;
                transition: transform 0.2s;
            }

            .btn-login:hover {
                transform: translateY(-2px);
                color: white;
            }

            .input-group-text {
                background: transparent;
                border-right: none;
            }

            .form-control {
                border-left: none;
            }

            .form-control:focus {
                border-color: #ced4da;
            }

            .input-group:focus-within .input-group-text {
                border-color: #667eea;
            }
        </style>
    </head>
    <body>
        <div class="login-card">
            <div class="login-header">
                <h2>ModernShop</h2>
                <p>Welcome back! Please login to your account</p>
            </div>
            <form id="loginForm">
                <!-- ایمیل -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"
                            ><i class="bi bi-envelope"></i
                        ></span>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            placeholder="admin@modernshop.com"
                            required
                        />
                    </div>
                </div>
                <!-- رمز عبور -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"
                            ><i class="bi bi-lock"></i
                        ></span>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            placeholder="••••••"
                            required
                        />
                    </div>
                </div>
                <!-- Remember me & Forgot password -->
                <div
                    class="d-flex justify-content-between align-items-center mb-4"
                >
                    <div class="form-check">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="remember"
                        />
                        <label for="remember" class="form-check-label small"
                            >Remember me</label
                        >
                    </div>
                    <a href="#" class="text-decoration-none small text-primary"
                        >Forgot password</a
                    >
                </div>
                <!-- دکمه ورود -->
                <button class="btn btn-login w-100 mb3" type="submit">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
                <!-- دکمه بازگشت به فروشگاه -->
                <a
                    href="index.html"
                    class="btn btn-outline-secondary w-100 mt-2"
                >
                    <i class="bi bi-shop"></i> Back to Store
                </a>
            </form>
            <hr class="my-4" />
            <p class="text-center text-muted small mb-0">
                Demo credentials:
                <strong>admin@modernshop.com</strong> /
                <strong>admin123</strong>
            </p>
        </div>
        <script>
            const loginForm = document.getElementById("loginForm");

            loginForm.addEventListener("submit", function (e) {
                e.preventDefault();

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                // بررسی ساده (در پروژه واقعی باید با API چک شود)
                if (
                    email === "admin@modernshop.com" &&
                    password === "admin123"
                ) {
                    // ذخیره وضعیت لاگین در localStorage
                    localStorage.setItem("isLoggedIn", "true");
                    localStorage.setItem("userEmail", email);

                    // نمایش پیام موفقیت
                    alert("✅ Login successful! Redirecting to dashboard...");

                    // رفتن به داشبورد
                    window.location.href = "dashboard.html";
                } else {
                    alert(
                        "❌ Invalid email or password!\nUse: admin@modernshop.com / admin123",
                    );
                }
            });
        </script>
    </body>
</html>
